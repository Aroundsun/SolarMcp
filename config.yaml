# SolarMcp 服务器配置
# 默认值 — 可通过命令行覆盖：--config <path>

server:
  host: "0.0.0.0"
  port: 8090
  transport: "tcp"            # "tcp" | "unix" (P1)

logging:
  level: "info"               # trace | debug | info | warn | error | fatal
  file: "./logs/solarmcp.log"
  max_size_mb: 100
  async: true

thread_pool:
  worker_threads: 4
  max_queue_size: 10000

plugins:
  directory: "./plugins/lib/"   # 运行时 .so（见 docs/插件ABI.md）
  autoload: true
  allow_reload: true            # 允许运行时 plugins/reload 热重载

tools:
  read_file:
    enabled: true
    max_size_mb: 10
    allowed_paths: ["/tmp", "/home"]

  # Shell 命令执行（插件 shell_plugin 读取此配置）
  # 警告：等同于远程 shell，务必开启 auth 并仅在受信环境使用
  shell:
    enabled: true
    timeout_sec: 30
    max_output_mb: 10
    allowed_shells: ["/bin/sh", "/bin/bash"]

auth:
  enabled: true
  token: "your-secret-token-change-me"
