# SolarMcp 服务器配置
# 默认值 — 可通过命令行覆盖：--config <path>

server:
  host: "0.0.0.0"
  port: 8090
  transport: "tcp"            # "tcp" | "unix" (P1)

logging:
  level: "info"               # trace | debug | info | warn | error | fatal
  file: "./logs/solarmcp.log"
  max_size_mb: 100
  async: true

thread_pool:
  worker_threads: 4
  max_queue_size: 10000

plugins:
  directory: "./plugins/"
  autoload: true

tools:
  read_file:
    enabled: true
    max_size_mb: 10
    allowed_paths: ["/tmp", "/home"]

auth:
  enabled: false
  token: ""
