# SolarMcp 服务器配置（Core 仅框架 + 内置工具）
# 插件业务配置见 plugins/{name}/*.yaml

server:
  host: "0.0.0.0"
  port: 8090
  transport: "tcp"            # "tcp" | "unix" (P1)

logging:
  level: "info"               # trace | debug | info | warn | error | fatal
  file: "./logs/solarmcp.log"
  max_size_mb: 100
  async: true

thread_pool:
  worker_threads: 4
  max_queue_size: 10000

plugins:
  directory: "./plugins/"       # 扫描子目录，每目录一个 .so + 可选 yaml
  autoload: true
  allow_reload: true            # 允许运行时 plugins/reload 热重载

tools:
  read_file:
    enabled: true
    max_size_mb: 10
    allowed_paths: ["/tmp", "/home"]

auth:
  enabled: true
  token: "your-secret-token-change-me"
